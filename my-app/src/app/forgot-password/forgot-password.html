<div class="login-page">
  <div class="login-card">
    <div class="form-container">
      <div class="form-header">
        <div class="brand-mini-label">LỊM DONUT</div>
        <h1 class="welcome-text">Đặt lại mật khẩu</h1>
        <p class="welcome-subtext">Vui lòng điền thông tin để cập nhật mật khẩu của bạn.</p>
      </div>

      <div class="login-type-title">
        <span>Cập nhật mật khẩu mới</span>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form">
        <div class="input-group">
          <label for="username">Tên đăng nhập <span class="required">*</span></label>
          <input type="text" id="username" [ngModel]="username()" (ngModelChange)="username.set($event)" name="username" placeholder="Nhập tên đăng nhập của bạn" required>
        </div>

        <div class="input-group">
          <label for="oldPassword">Mật khẩu cũ <span class="required">*</span></label>
          <input type="password" id="oldPassword" [ngModel]="oldPassword()" (ngModelChange)="oldPassword.set($event)" name="oldPassword" placeholder="Nhập mật khẩu cũ" required>
        </div>

        <div class="input-group">
          <label for="newPassword">Mật khẩu mới <span class="required">*</span></label>
          <input type="password" id="newPassword" [ngModel]="newPassword()" (ngModelChange)="newPassword.set($event)" name="newPassword" placeholder="Nhập mật khẩu mới" required>
        </div>

        <div class="input-group">
          <label for="confirmPassword">Xác nhận mật khẩu mới <span class="required">*</span></label>
          <input type="password" id="confirmPassword" [ngModel]="confirmPassword()" (ngModelChange)="confirmPassword.set($event)" name="confirmPassword" placeholder="Nhập lại mật khẩu mới" required>
        </div>

        <button type="submit" class="submit-btn">
          Cập nhật mật khẩu
        </button>

        <div class="divider-text">Hoặc</div>

        <button type="button" class="create-account-btn" routerLink="/login">
          Quay lại Đăng nhập
        </button>
      </form>
    </div>
  </div>
</div>

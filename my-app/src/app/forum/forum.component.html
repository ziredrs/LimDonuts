<div class="forum-page">
  <!-- Page Banner (Like Contact Page) -->
  <section class="page-banner">
    <div class="banner-content">
      <span class="subtitle">DIỄN ĐÀN LIMDONUT</span>
      <h1 class="title">Tin tức & Khuyến mãi</h1>
      <p class="desc">Cập nhật những tin tức mới nhất và chương trình ưu đãi hấp dẫn từ LIMDonut.</p>
    </div>
  </section>

  <!-- Blog Content with Background -->
  <section class="forum-content">
    <div class="container">
      <div class="blog-grid">
        <div class="blog-card" *ngFor="let post of pagedPosts" [routerLink]="['/forum', post.id]">
          <div class="card-image">
            <img [src]="post.mainImage" [alt]="post.title">
          </div>
          <div class="card-body">
            <span class="post-date">{{ post.date }}</span>
            <h3 class="post-title">{{ post.title }}</h3>
          </div>
        </div>
      </div>

      <!-- Pagination -->
      <div class="pagination" *ngIf="totalPages > 1">
        <button class="page-btn" (click)="setPage(currentPage - 1)" [disabled]="currentPage === 1">
          <i class="fas fa-chevron-left"></i>
        </button>

        <button *ngFor="let page of pages" class="page-btn" [class.active]="currentPage === page"
          (click)="setPage(page)">
          {{ page }}
        </button>

        <button class="page-btn" (click)="setPage(currentPage + 1)" [disabled]="currentPage === totalPages">
          <i class="fas fa-chevron-right"></i>
        </button>
      </div>
    </div>
  </section>
</div>

<div class="branches-page">
  <!-- Page Banner -->
  <section class="page-banner">
    <div class="banner-content">
      <span class="subtitle">HỆ THỐNG CỬA HÀNG</span>
      <h1 class="title">Các chi nhánh hoạt động</h1>
      <p class="desc">Ghé thăm và trải nghiệm không gian ngọt ngào tại các cửa hàng của LIMDonut.</p>
    </div>
  </section>

  <section class="branches-content">
    <div class="container">
      <div class="branches-wrapper">
        <!-- Left: Branches List -->
        <div class="branches-list">
          <div 
            *ngFor="let branch of branches" 
            class="branch-item" 
            [class.active]="selectedBranch.id === branch.id"
            (click)="selectBranch(branch)"
          >
            <div class="branch-image">
              <img [src]="branch.image" [alt]="branch.name">
            </div>
            <div class="branch-info">
              <h3>
                <span class="icon">🏠</span> 
                {{ branch.name }}
              </h3>
              <p class="address">
                <span class="icon">📍</span> 
                {{ branch.address }}
              </p>
              <p class="phone">
                <span class="icon">📞</span> 
                {{ branch.phone }}
              </p>
            </div>
          </div>
        </div>

        <!-- Right: Map View -->
        <div class="map-container">
          <div class="map-header">
            <span class="icon">📍</span>
            <span>{{ selectedBranch.address }}</span>
          </div>
          <div class="map-iframe-wrapper">
            <iframe 
              [src]="selectedBranch.safeMapUrl" 
              width="100%" 
              height="100%" 
              style="border:0;" 
              allowfullscreen="" 
              loading="lazy" 
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
          </div>
          <div class="map-footer">
            <a [href]="'https://www.google.com/maps/search/?api=1&query=' + selectedBranch.address" target="_blank" class="open-maps-btn">
              Mở trong Maps <span class="external-icon">↗</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
